<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6cff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Org chart: top node -->
  <rect x="11" y="4" width="10" height="6" rx="2" fill="white" opacity="0.95"/>
  <!-- Connecting lines -->
  <line x1="16" y1="10" x2="16" y2="14" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="8" y1="14" x2="24" y2="14" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Left branch -->
  <line x1="8" y1="14" x2="8" y2="18" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <rect x="3" y="18" width="10" height="6" rx="2" fill="white" opacity="0.85"/>
  <!-- Right branch -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <rect x="19" y="18" width="10" height="6" rx="2" fill="white" opacity="0.85"/>
</svg>
